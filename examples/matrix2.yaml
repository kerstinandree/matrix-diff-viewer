metadata:
  format_version: "1.0"
  description: "Process adjacency matrix - modified version"
  activities: ['Outcome: Success', 'Outcome: Fail', 'Checking case_NumberOfTerms', 'Checking case_RequestedAmount', 'Approval Decision', 'Final Review']

dependencies:
  # Dependencies from 'Outcome: Success' to all other activities
  - from: 'Outcome: Success'
    to: 'Outcome: Fail'
    temporal:
      type: possible
      symbol: ◇t
      direction: forward
    existential:
      type: nand
      symbol: ⊼
      direction: both

  - from: 'Outcome: Success'
    to: Checking case_NumberOfTerms
    temporal:
      type: always
      symbol: □t
      direction: backward
    existential:
      type: implication
      symbol: =>
      direction: forward

  - from: 'Outcome: Success'
    to: Checking case_RequestedAmount
    temporal:
      type: eventual
      symbol: ≻t
      direction: backward
    existential:
      type: disjunction
      symbol: ∨
      direction: forward

  - from: 'Outcome: Success'
    to: 'Approval Decision'
    temporal:
      type: eventual
      symbol: ≻t
      direction: forward
    existential:
      type: implication
      symbol: =>
      direction: forward

  - from: 'Outcome: Success'
    to: 'Final Review'
    temporal:
      type: possible
      symbol: ◇t
      direction: backward
    existential:
      type: equivalence
      symbol: <=>
      direction: both

  # Dependencies from 'Outcome: Fail' to all other activities
